<!doctype HTML>
<html>
    <head>
        <title>Presentation</title>
        <link rel="shortcut icon" type="image/png" href="/static/favicon.png">
        <script src="/pkgs/htmx.org@4.0.0-alpha8/dist/htmx.min.js"></script>
        <link rel="stylesheet" href="/static/dashboard.css" />
    </head>
    <body>
        <div class="frame dashboard">

            <div class="section-list">
            {% for section in sections %}
            <div class="section-title">
                {{ section.title }}
            </div> <!-- section-title -->
            <div class="section-body">
            {%- for slide in section.slides %}
            <div class="slide-thumb" hx-get="/activate/{{ slide.identifier }}/" hx-swap="none">
                {% for stanza in slide.stanzas %}
                <div class="slide-thumb-content">{{ stanza.text }}</div>
                {% endfor %}
            </div>
            {%- endfor %}
            </div> <!-- /section-body -->
            {%- endfor %}
            </div> <!-- /section-list -->

            <div class="bar-right">
            {%- for outputnumber in outputs %}
            <a href="/output/{{ outputnumber }}/" target="_new">
            <div class="output-link">
                <img src="/pkgs/bootstrap-icons@1.13.1/icons/tv.svg" alt="Screen" width="32" height="32" >
                <br />
                Launch Output {{ outputnumber }} &nearr;
            </div> <!-- output-link -->
            </a>
            {%- endfor %}
            <a hx-get="/activate/@blank/" hx-swap="none"
               hx-trigger="click, keyup[key=='b'] from:body">
            <div class="action-button">
                <img src="/pkgs/bootstrap-icons@1.13.1/icons/x-square.svg" alt="Blank" width="32" height="32" >
                <br />
                Blank
            </div>
            </a>
            </div> <!-- bar-right -->
        </div>
    </body>
</html>
