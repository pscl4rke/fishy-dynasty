<!-- completely empty sse events don't update at all! -->
<div class="slide-body">
<div class="slide-content">
{%- for stanza in slide.stanzas %}
    <div class="stanza by-{{ stanza.speaker.value }}">{{ stanza.text }}</div>
{%- endfor %}
</div>
</div>
<div class="slide-footer">
{%- if slide.footer_title %}
    <div class="footer-title">{{ slide.footer_title.strip() }}</div>
{%- endif %}
{%- if slide.footer_byline %}
    <div class="footer-byline">{{ slide.footer_byline.strip() }}</div>
{%- endif %}
</div>
